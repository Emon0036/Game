<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock paper scissor</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <h1>Rock paper scissors</h1>

    <!--//This is the section main section of the game-->
    <div class="choices">
        <div class="choice" id="rock">
            <img src="./picture/rock.png" alt="">
        </div>

        <div class="choice" id="paper">
            <img src="./picture/paper.png" alt="">
        </div>

        <div class="choice" id="scissor">
            <img src="./picture/scissors.png" alt="">
        </div>

    </div>

<!--This is the score board area-->
    <div class="score-box">

        <div id="you">
            <p id="sc">0</p>
            <p id="per">You</p>
        </div>

        <div id="com">
            <p id="csr">0</p>
            <p id="cper">Comp</p>
        </div>


    </div>

 <!--message area -->

    <div class="show-message">
        <p id="message">Play your move</p>
    </div>
</body>
</html>
